<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail — Inbox</title>

<!--
  Theme pre-paint script.
  This runs synchronously, before the browser paints anything, so we
  read the saved theme (or the OS preference) and set it on <html>
  BEFORE any CSS renders. Skip this and you'd see a flash of dark mode
  that snaps to light mode a frame later — a classic "FOUC" bug.
-->
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>

<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" aria-label="Mailbox navigation">

    <div class="brand">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2.5" y="5" width="19" height="14" rx="3"></rect>
          <path d="M3.5 7.5l8.5 6 8.5-6"></path>
        </svg>
      </span>
      <span class="brand__name">Mail</span>
    </div>

    <button class="compose-btn" id="composeBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
      <span>Compose</span>
    </button>

    <nav class="nav" aria-label="Folders">
      <ul class="nav__list">
        <li>
          <a href="#" class="nav__item nav__item--active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline>
              <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
            </svg>
            <span>Inbox</span>
            <span class="nav__count" id="inboxCount">128</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            <span>Starred</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            <span>Sent</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <span>Drafts</span>
            <span class="nav__count">3</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav__item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>Trash</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar__footer">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">

    <header class="topbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="search" placeholder="Search mail" aria-label="Search mail">
      </div>
      <div class="account">
        <div class="account__avatar" title="krishnavarma024@gmail.com">KV</div>
      </div>
    </header>

    <!--
      Phase 2: app.js generates 5,000 mock emails and render.js writes
      every single one of them in here as a real <li> — naively, on
      purpose. Phase 3 replaces renderAllRows() with the virtualization
      engine; this markup and its CSS don't change at all, only how many
      rows actually get created does.
    -->
    <main class="list-viewport" id="listViewport" aria-label="Email list">
      <ul class="email-list" id="emailList">
        <noscript>
          <li class="email-row">
            <span class="email-row__subject">This app needs JavaScript enabled to load your inbox.</span>
          </li>
        </noscript>
      </ul>
    </main>
  </div>
</div>

<!--
  Phase 4: compose modal. Lives outside .app on purpose — .app has its
  own stacking context (position: relative + z-index: 1) for the
  floating topbar; keeping the modal as a sibling of .app instead of a
  child means its z-index only has to beat .app as a whole, not every
  z-index used inside it.
-->
<div class="modal-overlay" id="composeOverlay" aria-hidden="true">
  <div class="compose-modal" id="composeModal" role="dialog" aria-modal="true" aria-labelledby="composeTitle">
    <header class="compose-modal__header">
      <h2 class="compose-modal__title" id="composeTitle">New Message</h2>
      <button class="compose-modal__close" id="composeClose" type="button" aria-label="Close compose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="compose-modal__body">
      <div class="compose-field">
        <label class="compose-field__label" for="composeTo">To</label>
        <input class="compose-field__input" id="composeTo" type="text" placeholder="Recipients" autocomplete="off">
      </div>
      <div class="compose-field">
        <label class="compose-field__label" for="composeSubject">Subject</label>
        <input class="compose-field__input" id="composeSubject" type="text" placeholder="Subject" autocomplete="off">
      </div>
      <textarea class="compose-modal__textarea" id="composeBody" placeholder="Write your message..."></textarea>
    </div>

    <footer class="compose-modal__footer">
      <button class="compose-modal__send" id="composeSend" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <span>Send</span>
      </button>
      <button class="compose-modal__discard" id="composeDiscard" type="button" aria-label="Discard draft">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
    </footer>
  </div>
</div>

<script src="js/theme.js" defer></script>
<script src="js/data.js" defer></script>
<script src="js/state.js" defer></script>
<script src="js/virtualList.js" defer></script>
<script src="js/render.js" defer></script>
<script src="js/keyboard.js" defer></script>
<script src="js/compose.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
